; =============================================================================
; Configuration PHP Production pour Kerala Restaurant Backend
; =============================================================================

; Optimisations OPcache
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; Note: Le preload sera activé après le premier cache:warmup
; opcache.preload=/var/www/html/var/cache/prod/App_KernelProdContainer.preload.php
; opcache.preload_user=www-data

; Limites mémoire et exécution
memory_limit=256M
max_execution_time=120
max_input_time=60

; Upload (pour images produits, logos)
upload_max_filesize=20M
post_max_size=25M
max_file_uploads=20

; Timezone
date.timezone=Europe/Paris

; Gestion des erreurs (production)
display_errors=Off
display_startup_errors=Off
log_errors=On
error_log=/var/log/php/error.log
error_reporting=E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session
session.cookie_httponly=1
session.cookie_secure=1
session.use_strict_mode=1

; Sécurité
expose_php=Off
allow_url_fopen=On
allow_url_include=Off

; Realpath cache (performance)
realpath_cache_size=4096K
realpath_cache_ttl=600

; Intl
intl.default_locale=fr_FR

; Mbstring
mbstring.language=French
mbstring.internal_encoding=UTF-8
