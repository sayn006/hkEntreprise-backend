server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Taille max upload (pour images produits, logos)
    client_max_body_size 25M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Symfony front controller
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Paramètres essentiels pour transmettre le body des requêtes POST/PUT/PATCH
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REQUEST_BODY $request_body;

        # Buffer pour le body des requêtes
        fastcgi_request_buffering on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Timeouts pour les requêtes longues (PDF, imports)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        internal;
    }

    # Bloquer l'accès direct aux autres fichiers PHP
    location ~ \.php$ {
        return 404;
    }

    # Fichiers statiques avec cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Uploads (images produits, logos, factures)
    location /uploads {
        alias /var/www/html/public/uploads;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Cacher les fichiers sensibles
    location ~ /\. {
        deny all;
    }

    # Bloquer l'accès aux fichiers de config
    location ~ /(composer\.|package|\.env|\.git) {
        deny all;
    }
}
